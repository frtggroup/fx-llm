name: Build & Push FX AI EA3 (逐次差分拡張イメージ)

on:
  push:
    paths:
      - 'DOK3/**'
      - 'fx-ea3/**'
      - '.github/workflows/build-dok3.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push frtgroup/fx-ea3:latest
        uses: docker/build-push-action@v6
        with:
          context: .
          file: DOK3/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fx-ea3:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fx-ea3:${{ github.sha }}
          platforms: linux/amd64
          build-args: |
            GDRIVE_OAUTH_CLIENT_ID=${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
            GDRIVE_OAUTH_CLIENT_SECRET=${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
            GDRIVE_OAUTH_REFRESH_TOKEN=${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}

      - name: Summary
        run: |
          echo "## ✅ FX AI EA3 イメージ ビルド完了" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---|" >> $GITHUB_STEP_SUMMARY
          echo "| イメージ | \`${{ secrets.DOCKERHUB_USERNAME }}/fx-ea3:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 特徴量 | 1750次元 (70グループ × 25列: 基底+逐次差分24本) |" >> $GITHUB_STEP_SUMMARY
          echo "| S3 prefix | \`mix2\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 対応環境 | GTX / RTX / H100 / H200 / TPU (起動時自動検出) |" >> $GITHUB_STEP_SUMMARY
          echo "| ダッシュボード | ポート \`8080\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SSH | ポート \`22\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 起動コマンド" >> $GITHUB_STEP_SUMMARY
          echo "**GPU (Vast.ai / ローカル):**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker run --gpus all --privileged --net=host ${{ secrets.DOCKERHUB_USERNAME }}/fx-ea3:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "**TPU (Google Cloud TPU VM):**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker run --privileged --net=host ${{ secrets.DOCKERHUB_USERNAME }}/fx-ea3:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
